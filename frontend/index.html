    <meta

    />

  <body style="background: rgb(87, 99, 117)">
    <!-- Splash screen (shown immediately before JS loads) -->
    <div
      id="splash-screen"
      style="
        position: fixed;
        z-index: 100;
        background-color: hsl(var(--primary));
        background-image: url(&quot;/static/assets/splash/wallpapers/Forest_Green__min.png&quot;);
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        transition: all 150ms;
        /* Same as body */
        color: rgb(var(--background));
        top: 0px;
        left: 0px;
        width: 100%;
        height: 100%;
        user-select: none; /* Do not allow the user to select */
      "
    >
      <img
        width="90px"
        alt="Greening Belize"
        style="position: absolute; top: 50%; left: 50%; margin: -80px 0 0 -45px"
        src="/static/assets/splash/logos/White_FFFFFF.png"
      />
    </div>
