name: Build Capacitor iOS
on: [push, workflow_dispatch ]

jobs:
  build:
    runs-on: macos-latest
    
    # Automatically runs all steps inside the frontend folder
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm' # Optional: Caches dependencies for faster builds
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build Native iOS App
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     build
                     
      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-app
          path: ~/Library/Developer/Xcode/DerivedData/App-*/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 7
